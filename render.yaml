services:
  - type: web
    name: sneaker-marketplace-api
    env: node
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && node prisma/seed.js
    startCommand: node src/server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sneaker-marketplace-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

databases:
  - name: sneaker-marketplace-db
    databaseName: sneaker_marketplace
    user: sneaker_user
